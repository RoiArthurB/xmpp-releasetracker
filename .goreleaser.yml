version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - arm
      - "386"
    goarm:
      - "7"
    ignore:
      - goos: darwin
        goarch: arm    # 32-bit ARM never existed on macOS
      - goos: darwin
        goarch: "386"  # dropped since macOS Catalina
      - goos: windows
        goarch: arm    # 32-bit ARM Windows is essentially unused

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

dockers:
  - image_templates:
      - "{{ .Env.DOCKERHUB_USERNAME }}/xmpp-releasetracker:{{ .Version }}-amd64"
      - "ghcr.io/{{ .Env.GHCR_USERNAME }}/xmpp-releasetracker:{{ .Version }}-amd64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"

  - image_templates:
      - "{{ .Env.DOCKERHUB_USERNAME }}/xmpp-releasetracker:{{ .Version }}-arm64"
      - "ghcr.io/{{ .Env.GHCR_USERNAME }}/xmpp-releasetracker:{{ .Version }}-arm64"
    use: buildx
    goarch: arm64
    build_flag_templates:
      - "--platform=linux/arm64"

docker_manifests:
  - name_template: "{{ .Env.DOCKERHUB_USERNAME }}/xmpp-releasetracker:{{ .Version }}"
    image_templates:
      - "{{ .Env.DOCKERHUB_USERNAME }}/xmpp-releasetracker:{{ .Version }}-amd64"
      - "{{ .Env.DOCKERHUB_USERNAME }}/xmpp-releasetracker:{{ .Version }}-arm64"

  - name_template: "{{ .Env.DOCKERHUB_USERNAME }}/xmpp-releasetracker:latest"
    image_templates:
      - "{{ .Env.DOCKERHUB_USERNAME }}/xmpp-releasetracker:{{ .Version }}-amd64"
      - "{{ .Env.DOCKERHUB_USERNAME }}/xmpp-releasetracker:{{ .Version }}-arm64"

  - name_template: "ghcr.io/{{ .Env.GHCR_USERNAME }}/xmpp-releasetracker:{{ .Version }}"
    image_templates:
      - "ghcr.io/{{ .Env.GHCR_USERNAME }}/xmpp-releasetracker:{{ .Version }}-amd64"
      - "ghcr.io/{{ .Env.GHCR_USERNAME }}/xmpp-releasetracker:{{ .Version }}-arm64"

  - name_template: "ghcr.io/{{ .Env.GHCR_USERNAME }}/xmpp-releasetracker:latest"
    image_templates:
      - "ghcr.io/{{ .Env.GHCR_USERNAME }}/xmpp-releasetracker:{{ .Version }}-amd64"
      - "ghcr.io/{{ .Env.GHCR_USERNAME }}/xmpp-releasetracker:{{ .Version }}-arm64"
