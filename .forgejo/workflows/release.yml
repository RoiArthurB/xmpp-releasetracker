name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: git.arthurbrugiere.fr
  IMAGE_NAME: roiarthurb/xmpp-releasetracker

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # GoReleaser needs full history for changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Use the daemon's built-in builder instead of the docker-container
          # driver. The latter boots a moby/buildkit container on the workflow
          # network, whose embedded DNS (127.0.0.11) cannot reach Docker Hub on
          # this runner. The daemon resolves registries fine (it pulled the job
          # image), so building through it avoids the timeout.
          driver: docker

      # REGISTRY_USERNAME and REGISTRY_PASSWORD must be set as repo secrets.
      # REGISTRY_PASSWORD can be a Forgejo access token with package:write scope.
      - name: Log in to Forgejo Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Run GoReleaser
        # Full URL required: Forgejo resolves bare action names against its
        # data.forgejo.org mirror, which does not host goreleaser-action.
        uses: https://github.com/goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean --config .goreleaser.forgejo.yml
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          REGISTRY: ${{ env.REGISTRY }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
